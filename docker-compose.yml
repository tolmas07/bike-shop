version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bike_shop
    ports:
      - 3306:3306
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/bike_shop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
      TELEGRAM_BOT_USERNAME: Diplom_zakazi_bot
      TELEGRAM_BOT_TOKEN: 8791676846:AAH7GgTObjAeEqdAI7wqDif-YaFuWB_Hnhg
      TELEGRAM_ADMIN_CHATID: 1039005229
    ports:
      - 8080:8080

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./web:/app
    command: sh -c "npm ci && npm run build && npm install -g serve && serve -s dist -l 3000"
    ports:
      - 5173:3000

volumes:
  db_data:
